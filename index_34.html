// ── SUPABASE ─────────────────────────────────────────────────────────────────
async function dbGet(key){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/gamedata?key=eq.${encodeURIComponent(key)}&select=value`,
      {headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
    const rows=await r.json();
    return rows&&rows.length?rows[0].value:null;
  }catch{return null;}
}

async function dbSet(key,value){
  try{
    // Try PATCH (update) first
    const patch=await fetch(`${SB_URL}/rest/v1/gamedata?key=eq.${encodeURIComponent(key)}`,{
      method:"PATCH",
      headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":"return=representation"},
      body:JSON.stringify({value})
    });
    const patchResult=await patch.json();
    console.log('PATCH result for',key,patch.status,patchResult);
    // If no rows updated, INSERT
    if(!patchResult||patchResult.length===0){
      const ins=await fetch(`${SB_URL}/rest/v1/gamedata`,{
        method:"POST",
        headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":"return=representation"},
        body:JSON.stringify({key,value})
      });
      const insResult=await ins.json();
      console.log('INSERT result for',key,ins.status,insResult);
    }
  }catch(e){
    console.error('dbSet FAILED for',key,e);
    // Show visible error so we can debug
    const errDiv=document.getElementById('sb-error');
    if(errDiv){errDiv.textContent='Save error: '+e.message+' (key: '+key+')';errDiv.style.display='block';}
  }
}

function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

const pending={};
function store(key,val){
  lsSet('wc-'+key,val);
  clearTimeout(pending[key]);
  pending[key]=setTimeout(()=>dbSet(key,JSON.stringify(val)),300);
}
async function fetch2(key,def){
  const cached=lsGet('wc-'+key);
  dbGet(key).then(raw=>{
    if(raw!=null){try{lsSet('wc-'+key,JSON.parse(raw));}catch{}}
  });
  return cached!=null?cached:def;
}
async function fetchFresh(key,def){
  const raw=await dbGet(key);
  if(raw!=null){try{const v=JSON.parse(raw);lsSet('wc-'+key,v);return v;}catch{}}
  return lsGet('wc-'+key)??def;
}

// ── SCORING ──────────────────────────────────────────────────────────────────
function outcome(s1,s2){return s1>s2?'t1':s2>s1?'t2':'draw';}
function score(picks,actual,gpicks,gactual,champ,ru,achamp,aru){
  let p=0;
  SCHEDULE.forEach(m=>{
    const res=actual[m.id]||m.result;
    const pk=picks[m.id];
    if(!res||!pk)return;
    if(pk.outcome===outcome(res.s1,res.s2))p+=3;
    if(pk.s1!==''&&pk.s2!==''&&+pk.s1===res.s1&&+pk.s2===res.s2)p+=2;
  });
  // group picks
  Object.keys(GROUPS).forEach(g=>{
    const pp=gpicks&&gpicks[g],ap=gactual&&gactual[g];
    if(!pp||!ap)return;
    const g1=pp.first&&pp.first===ap.first;
    const g2=pp.second&&pp.second===ap.second;
    if(g1)p+=5; if(g2)p+=3; if(g1&&g2)p+=2;
  });
  // perfect days
  const dates=[...new Set(SCHEDULE.map(m=>m.date))];
  dates.forEach(date=>{
    const ms=SCHEDULE.filter(m=>m.date===date);
    const settled=ms.filter(m=>actual[m.id]||m.result);
    if(settled.length!==ms.length||settled.length===0)return;
    const allRight=settled.every(m=>{
      const res=actual[m.id]||m.result;
      const pk=picks[m.id];
      return pk&&pk.outcome===outcome(res.s1,res.s2);
    });
    if(allRight&&settled.every(m=>picks[m.id]))p+=15;
  });
  if(achamp&&champ===achamp)p+=35;
  if(aru&&ru===aru)p+=10;
  return p;
}

// ── DEADLINES ────────────────────────────────────────────────────────────────
// 30 min before first game of each day (ET = UTC-4)
function firstKickoffUTC(date){
  const ms=SCHEDULE.filter(m=>m.date===date);
  let earliest=null;
  ms.forEach(m=>{
    const t=m.time.replace(' ET','');
    const [tp,ap]=t.split(' ');
    const [h,mi]=tp.split(':').map(Number);
    let hr=h;
    if(ap==='PM'&&h!==12)hr+=12;
    if(ap==='AM'&&h===12)hr=0;
    const utc=hr+4;
    if(utc>=9&&(earliest===null||utc<earliest))earliest=utc;
  });
  return earliest;
}
function isDayLocked(date){
  const h=firstKickoffUTC(date);
  if(h===null)return false;
  const [,mon,day]=date.split(' ');
  const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6};
  const dl=new Date(Date.UTC(2026,months[mon],+day,h-1,30));// 30min before
  return new Date()>=dl;
}
const GROUP_DL=new Date(Date.UTC(2026,5,18,15,30));// Jun 18 11:30am ET
const CHAMP_DL=new Date(Date.UTC(2026,5,28,3,30)); // Jun 27 11:30pm ET
function groupLocked(){return new Date()>=GROUP_DL;}
function champLocked(){return new Date()>=CHAMP_DL;}

// ── TIMEZONES ────────────────────────────────────────────────────────────────
const TZS=[{id:'ET',label:'ET',off:-4,flag:'🇺🇸'},{id:'CT',label:'CT',off:-5,flag:'🇺🇸'},{id:'MT',label:'MT',off:-6,flag:'🇺🇸'},{id:'PT',label:'PT',off:-7,flag:'🇺🇸'},{id:'CET',label:'CET',off:+2,flag:'🇩🇪'},{id:'GMT',label:'GMT',off:0,flag:'🇬🇧'}];
let currentTZ=TZS[0];
function cvtTime(t){
  const [tp,ap]=t.replace(' ET','').split(' ');
  const [h,m]=tp.split(':').map(Number);
  let hr=h;
  if(ap==='PM'&&h!==12)hr+=12;
  if(ap==='AM'&&h===12)hr=0;
  const utcH=hr+4;
  const lh=((utcH+currentTZ.off)%24+24)%24;
  const suf=lh>=12?'PM':'AM';
  const disp=lh%12===0?12:lh%12;
  return `${disp}:${m===0?'00':m} ${suf} ${currentTZ.label}`;
}

  state={...state,...patch};

// ── SUPABASE LOAD ─────────────────────────────────────────────────────────────
async function loadAll(fresh=false){
  const fn=fresh?fetchFresh:fetch2;
  const [pins,actual,gactual,achamp,aru]=await Promise.all([
    fn(K.pins,{}),fn(K.actual,{}),fn(K.gactual,{}),
    dbGet(K.achamp),dbGet(K.aru),
  ]);
  const names=Object.keys(pins).filter(n=>n!=='Commissioner');
  const userResults=await Promise.all(names.map(async n=>({
    n,
    picks:await fn(K.upicks(n),{}),
    gpicks:await fn(K.ugpicks(n),null),
    champ:lsGet('wc-'+K.uchamp(n)),
    ru:lsGet('wc-'+K.uru(n)),
  })));
  if(fresh){
    await Promise.all(userResults.map(async u=>{
      const c=await dbGet(K.uchamp(u.n));
      const r=await dbGet(K.uru(u.n));
      if(c)u.champ=c;
      if(r)u.ru=r;
    }));
  }
  const allPicks={},allGpicks={},allChamps={},allRU={};
  userResults.forEach(({n,picks,gpicks,champ,ru})=>{
    allPicks[n]=picks||{};
    if(gpicks&&Object.keys(gpicks).length>0)allGpicks[n]=gpicks;
    if(champ)allChamps[n]=champ;
    if(ru)allRU[n]=ru;
  });

  // ALWAYS preserve current user's in-memory picks — never overwrite with server data
  const u=state.user;
  if(u&&u!=='Commissioner'){
    const inMemory=state.allPicks[u]||{};
    const lsPicks=lsGet('wc-'+K.upicks(u))||{};
    // In-memory > localStorage > server — user's picks always win
    allPicks[u]={...(allPicks[u]||{}),...lsPicks,...inMemory};
  }

  // Only re-render on initial load, not on background refreshes
  const wasLoading=state.loading;
  setState({pins,actual,gactual,achamp:achamp||null,aru:aru||null,allPicks,allGpicks,allChamps,allRU,loading:false}, !wasLoading);
  // On background refresh, just update shared data without re-rendering picks
  if(!wasLoading){
    state.pins=pins;
    state.actual=actual;
    state.gactual=gactual;
    state.achamp=achamp||null;
    state.aru=aru||null;
    // Update other players' picks but preserve current user
    Object.keys(allPicks).forEach(n=>{
      if(n!==u) state.allPicks[n]=allPicks[n];
    });
    Object.keys(allGpicks).forEach(n=>state.allGpicks[n]=allGpicks[n]);
    Object.keys(allChamps).forEach(n=>state.allChamps[n]=allChamps[n]);
    Object.keys(allRU).forEach(n=>state.allRU[n]=allRU[n]);
    state.loading=false;
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function f(tag,props,...children){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on')&&typeof v==='function'){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){el.className=v;}
    else if(k==='htmlFor'){el.htmlFor=v;}
    else{try{el[k]=v;}catch{el.setAttribute(k,v);}}
  });
  children.flat(9).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return el;
}
function div(s,...c){return f('div',{style:s},...c);}
function btn(s,cb,...c){const b=f('button',{style:s,onClick:cb},...c);return b;}
function txt(s,t){return f('span',{style:s},t);}

function showToast(msg){
  setState({toast:msg});
  setTimeout(()=>setState({toast:null}),2500);
}

function renderJoin(root){

  function showErr(msg){err.textContent=msg;err.style.display='block';}

  function rebuild(){
    card.innerHTML='';
    card.appendChild(err);

    if(step==='name'){
      const allKnown=Object.keys(s.pins||{}).filter(n=>n!=='Commissioner');
      card.appendChild(txt({color:'#94a3b8',fontSize:'13px',fontWeight:'600',display:'block',marginBottom:'8px'},'Your name'));

          nrow.appendChild(nb);
        });
        card.appendChild(nrow);
      }
      const cb=btn({width:'100%',padding:'8px',borderRadius:'10px',border:'1px solid #22c55e',background:'transparent',color:'#22c55e',fontWeight:'600',fontSize:'13px',cursor:'pointer'},()=>{step='commpin';pinVal='';hideErr();rebuild();},'⚙️ Commissioner login');
      card.appendChild(cb);
      setTimeout(()=>inp.focus(),50);
    }
    else if(step==='newpin'){
      const bk=btn({background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:'13px',marginBottom:'12px',padding:'0',display:'block'},()=>{step='name';rebuild();},'← Back');
      card.appendChild(bk);
      card.appendChild(txt({fontWeight:'800',fontSize:'16px',display:'block',marginBottom:'4px'},'Hey '+nameVal+'! 👋'));
      card.appendChild(txt({color:'#64748b',fontSize:'13px',display:'block',marginBottom:'16px'},'Create a 4-digit PIN to protect your picks.'));
      card.appendChild(txt({color:'#94a3b8',fontSize:'12px',fontWeight:'600',display:'block',marginBottom:'6px'},'Choose a PIN'));
      const p1=makePinInput(v=>{pinVal=v;hideErr();},()=>{p2.focus();});
      card.appendChild(p1);
      card.appendChild(txt({color:'#94a3b8',fontSize:'12px',fontWeight:'600',display:'block',marginBottom:'6px'},'Confirm PIN'));
      const p2=makePinInput(v=>{confirmVal=v;hideErr();},doNewPin);
      p2.id='pin-confirm';
      card.appendChild(p2);
      card.appendChild(btn({width:'100%',padding:'12px',borderRadius:'10px',border:'none',background:'#f59e0b',color:'#0a1929',fontWeight:'800',fontSize:'16px',cursor:'pointer'},doNewPin,'Set PIN & start →'));
      setTimeout(()=>p1.focus(),50);

    else if(step==='enterpin'){
      const bk=btn({background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:'13px',marginBottom:'12px',padding:'0',display:'block'},()=>{step='name';rebuild();},'← Back');
      card.appendChild(bk);

      card.appendChild(txt({color:'#64748b',fontSize:'13px',display:'block',marginBottom:'16px'},'Enter your PIN to continue.'));
      const pi=makePinInput(v=>{pinVal=v;hideErr();},doEnterPin);
      card.appendChild(pi);
      card.appendChild(btn({width:'100%',padding:'12px',borderRadius:'10px',border:'none',background:'#f59e0b',color:'#0a1929',fontWeight:'800',fontSize:'16px',cursor:'pointer'},doEnterPin,'Enter →'));
      setTimeout(()=>pi.focus(),50);
    }
    else if(step==='commpin'){
      const bk=btn({background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:'13px',marginBottom:'12px',padding:'0',display:'block'},()=>{step='name';rebuild();},'← Back');
      card.appendChild(bk);

      card.appendChild(txt({color:'#64748b',fontSize:'13px',display:'block',marginBottom:'16px'},'Enter the Commissioner PIN.'));

    inp.addEventListener('input',e=>onChange(e.target.value));
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')onEnter();});
    return inp;
  }

  function goName(){
    const t=nameVal.trim();
    if(!t){showErr('Enter your name.');return;}
    if(t.toLowerCase()==='commissioner'){step='commpin';pinVal='';hideErr();rebuild();return;}
    const known=Object.keys(state.pins||{}).filter(n=>n!=='Commissioner').map(n=>n.toLowerCase());
    if(known.includes(t.toLowerCase())){step='enterpin';pinVal='';hideErr();rebuild();return;}
    step='newpin';pinVal='';confirmVal='';hideErr();rebuild();
  }
  function doNewPin(){
    if(pinVal.length!==4||!/^\d+$/.test(pinVal)){showErr('PIN must be 4 digits.');return;}
    if(pinVal!==confirmVal){showErr('PINs don\'t match.');confirmVal='';rebuild();return;}
    const newPins={...state.pins,[nameVal.trim()]:pinVal};
    store(K.pins,newPins);
    try{localStorage.setItem('wc26:username',nameVal.trim());}catch{}

    setState({user:nameVal.trim(),pins:newPins,showOnboard:true});
  }
  function doEnterPin(){
    const stored=state.pins[nameVal];
    if(!stored||pinVal===stored){
      try{localStorage.setItem('wc26:username',nameVal);}catch{}
      const hasGp=state.allGpicks[nameVal]&&Object.keys(state.allGpicks[nameVal]).length===12;
      // Returning user: skip onboarding, go straight to app or group picks if not done
      setState({user:nameVal,showOnboard:false});
    } else {showErr('Wrong PIN — try again.');pinVal='';rebuild();}
  }
  function doCommPin(){
    if(pinVal===COMM_PIN){try{localStorage.setItem('wc26:username','Commissioner');}catch{}setState({user:'Commissioner'});}
    else{showErr('Wrong PIN.');pinVal='';rebuild();}
  }

  rebuild();
  wrap.appendChild(card);
  root.appendChild(wrap);
}

let groupPicksInProgress = {};

function renderGroupPicks(root,user,existing){
  // Initialize only if empty or new user
  if(!groupPicksInProgress[user]){
    groupPicksInProgress[user]={};
    Object.keys(GROUPS).forEach(g=>{
      groupPicksInProgress[user][g]=existing&&existing[g]?{...existing[g]}:{first:null,second:null};
    });
  }
  const picks=groupPicksInProgress[user];
  const locked=groupLocked();

  const wrap=div({minHeight:'100vh',background:'#060f1e'});
  const hdr=div({background:'linear-gradient(135deg,#0a1929,#0f2b4a)',borderBottom:'1px solid #1e3a5f',padding:'16px 20px',position:'sticky',top:'0',zIndex:'10'});
  const hi=div({maxWidth:'720px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'});
  hi.appendChild(div({},txt({fontWeight:'800',fontSize:'17px',display:'block'},'🏆 Group Stage Predictions'),txt({color:'#64748b',fontSize:'12px',display:'block',marginTop:'2px'},'5pts 1st · 3pts 2nd · +2pts bonus · Deadline: Wed Jun 18 11:30am ET')));

  const filled=()=>Object.keys(GROUPS).filter(g=>picks[g]&&picks[g].first&&picks[g].second).length;
  const cntEl=div({textAlign:'right'});
  const lockBtn=btn({padding:'10px 18px',borderRadius:'10px',border:'none',fontWeight:'800',fontSize:'14px'},()=>{
    const f2=Object.keys(GROUPS).filter(g=>picks[g]&&picks[g].first&&picks[g].second).length;
    if(f2<12){alert('Please pick 1st and 2nd for all 12 groups before locking in.');return;}
    const newAll={...state.allGpicks,[user]:picks};
    store(K.ugpicks(user),picks);
    delete groupPicksInProgress[user];    setState({allGpicks:newAll,showGroups:false});
    showToast('Group picks locked in! 🔒');
  },'Lock in & play →');
  hi.appendChild(div({display:'flex',alignItems:'center',gap:'10px'},cntEl,lockBtn));
  hdr.appendChild(hi);
  wrap.appendChild(hdr);

  function updateUI(){
    const f2=filled();
    cntEl.textContent=f2+'/12 groups done';
    lockBtn.style.background=f2===12?'#f59e0b':'#1e3a5f';
    lockBtn.style.color=f2===12?'#0a1929':'#475569';
    lockBtn.style.cursor=f2===12?'pointer':'default';
    lockBtn.disabled=f2<12||locked;
  }

  const body=div({maxWidth:'720px',margin:'0 auto',padding:'20px 16px'});
  if(locked){
    const lb=div({background:'#1a0f0f',border:'1px solid #7f1d1d',borderRadius:'10px',padding:'10px 16px',marginBottom:'16px',display:'flex',gap:'8px',alignItems:'center'});
    lb.appendChild(txt({},'🔒 '));
    lb.appendChild(txt({color:'#f87171',fontSize:'13px',fontWeight:'600'},'The group prediction deadline has passed. No new picks accepted.'));
    body.appendChild(lb);
  }

  const grid=div({display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'12px'});

  // Store refs to all buttons and cards for style updates
  const allRefs=[]; // [{g, team, b1, b2, card, doneEl}]

  function refreshAllButtons(){
    allRefs.forEach(({g,team,b1,b2,card,doneEl})=>{
      const p=picks[g];
      const is1=p.first===team,is2=p.second===team;
      b1.style.border=is1?'2px solid #f59e0b':'2px solid #1e3a5f';
      b1.style.background=is1?'#f59e0b':'#0f2340';
      b1.style.color=is1?'#0a1929':'#475569';
      b2.style.border=is2?'2px solid #94a3b8':'2px solid #1e3a5f';
      b2.style.background=is2?'#334155':'#0f2340';
      b2.style.color=is2?'#e2e8f0':'#475569';
      const done=p.first&&p.second;
      card.style.borderColor=done?'#1e4a2f':'#1e3a5f';
      doneEl.style.display=done?'inline':'none';
    });
    updateUI();
  }

  Object.entries(GROUPS).forEach(([g,teams])=>{
    const card=div({background:'#0a1929',borderRadius:'13px',padding:'14px',border:'1px solid #1e3a5f'});
    const gl=div({display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'});
    gl.appendChild(div({background:'#f59e0b',color:'#0a1929',fontWeight:'800',borderRadius:'5px',padding:'2px 8px',fontSize:'12px'},'GROUP '+g));
    const doneEl=txt({fontSize:'11px',color:'#22c55e',fontWeight:'700',display:'none'},'✓ done');
    gl.appendChild(doneEl);
    card.appendChild(gl);

    teams.forEach(team=>{
      const row=div({display:'flex',gap:'6px',alignItems:'center',marginBottom:'6px'});
      const b1=btn({width:'36px',height:'28px',borderRadius:'6px',fontSize:'10px',fontWeight:'800',cursor:locked?'default':'pointer'},()=>{
        if(locked)return;
        const cur=picks[g];
        if(cur.first===team){picks[g]={...cur,first:null};}
        else if(cur.second===team){picks[g]={...cur,second:cur.first,first:team};}
        else{picks[g]={...cur,first:team};}
        refreshAllButtons();
      },'1st');
      const b2=btn({width:'36px',height:'28px',borderRadius:'6px',fontSize:'10px',fontWeight:'800',cursor:locked?'default':'pointer'},()=>{
        if(locked)return;
        const cur=picks[g];
        if(cur.second===team){picks[g]={...cur,second:null};}
        else if(cur.first===team){picks[g]={...cur,first:null};}
        else{picks[g]={...cur,second:team};}
        refreshAllButtons();
      },'2nd');
      allRefs.push({g,team,b1,b2,card,doneEl});
      const tl=div({display:'flex',alignItems:'center',gap:'6px',fontSize:'14px'},txt({},FLAGS[team]||'🏳️'),txt({},team));
      row.appendChild(b1);row.appendChild(b2);row.appendChild(tl);
      card.appendChild(row);
    });
    grid.appendChild(card);
  });

  // Apply initial styles
  refreshAllButtons();
  body.appendChild(grid);
  wrap.appendChild(body);
  updateUI();
  root.appendChild(wrap);
}

// ── DAY SECTION ───────────────────────────────────────────────────────────────
function renderDaySection(date,matches,myPicks,actual,isAdmin,user){
  const wrap=div({marginBottom:'24px'});
  const lbl=div({fontSize:'12px',fontWeight:'700',color:'#f59e0b',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'10px',paddingBottom:'6px',borderBottom:'1px solid #1e3a5f'},date);
  wrap.appendChild(lbl);
  const dayLocked=!isAdmin&&isDayLocked(date);
  if(!isAdmin&&isDayLocked(date)){
    const dlb=div({borderRadius:'9px',padding:'8px 14px',marginBottom:'10px',background:'#1a0f0f',border:'1px solid #7f1d1d',display:'flex',alignItems:'center',gap:'8px'});
    dlb.appendChild(txt({},'🔒 '));
    dlb.appendChild(txt({color:'#f87171',fontWeight:'700',fontSize:'13px'},'Picks locked for this day'));
    wrap.appendChild(dlb);
  }
  matches.forEach(m=>{
    wrap.appendChild(renderMatchCard(m,myPicks,actual,isAdmin,user,dayLocked));
  });
  return wrap;
}

function renderMatchCard(m,myPicks,actual,isAdmin,user,dayLocked){
  const res=actual[m.id]||m.result||null;
  const pick=isAdmin?null:myPicks[m.id]||null;
  const locked=!isAdmin&&(!!res||dayLocked);
  const ao=res?outcome(res.s1,res.s2):null;

  const card=div({background:'#0a1929',borderRadius:'13px',padding:'14px 16px',border:'1px solid '+(res?'#1e4a2f':'#1e3a5f'),marginBottom:'10px'});
  // header
  const mhdr=div({display:'flex',alignItems:'center',gap:'8px',marginBottom:'11px',flexWrap:'wrap'});
  mhdr.appendChild(div({background:'#f59e0b',color:'#0a1929',fontWeight:'800',borderRadius:'5px',padding:'2px 7px',fontSize:'11px'},'GRP '+m.grp));
  mhdr.appendChild(txt({color:'#475569',fontSize:'12px'},cvtTime(m.time)));
  if(res)mhdr.appendChild(txt({marginLeft:'auto',fontWeight:'700',fontSize:'13px',color:'#22c55e'},res.s1+' – '+res.s2+(ao==='draw'?' (Draw)':'')));
  else mhdr.appendChild(txt({color:'#334155',fontSize:'11px',marginLeft:'auto'},m.venue));
  card.appendChild(mhdr);

  // outcome buttons — update styles in place, no re-render
  const obRow=div({display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'6px',alignItems:'center',marginBottom:'11px'});

  function makeOutcomeBtn(team,side,pos){
    const isWinner=isAdmin&&ao===pos;
    const b=btn({display:'flex',alignItems:'center',gap:'7px',padding:'9px 11px',borderRadius:'9px',border:isWinner?'2px solid #f59e0b':'2px solid transparent',background:isWinner?'#1e3a5f':'#0f2340',color:isWinner?'#f59e0b':'#94a3b8',fontWeight:isWinner?'700':'400',cursor:(isAdmin||locked)?'default':'pointer',fontSize:'13px',justifyContent:side==='right'?'flex-end':'flex-start'},()=>{
      if(isAdmin||locked)return;
      const cur=state.allPicks[user]&&state.allPicks[user][m.id]||{outcome:null,s1:'',s2:''};
      const newOutcome=cur.outcome===pos?null:pos;
      updatePick(m.id,{...cur,outcome:newOutcome},user);
      // Update all outcome button styles in place
      refreshOutcomeButtons(newOutcome);
      refreshFeedback(newOutcome,cur.s1,cur.s2);
    },txt({fontSize:'17px'},FLAGS[team]||'🏳️'),txt({overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},team));
    return b;
  }

  const t1Btn=makeOutcomeBtn(m.t1,'left','t1');
  const t2Btn=makeOutcomeBtn(m.t2,'right','t2');

  const drawBtn=btn({padding:'6px 8px',borderRadius:'8px',border:'2px solid #1e3a5f',background:'#0f2340',color:'#475569',fontWeight:'700',cursor:(isAdmin||locked)?'default':'pointer',fontSize:'11px',whiteSpace:'nowrap'},()=>{
    if(isAdmin||locked)return;
    const cur=state.allPicks[user]&&state.allPicks[user][m.id]||{outcome:null,s1:'',s2:''};
    const newOutcome=cur.outcome==='draw'?null:'draw';
    updatePick(m.id,{...cur,outcome:newOutcome},user);
    refreshOutcomeButtons(newOutcome);
    refreshFeedback(newOutcome,cur.s1,cur.s2);
  },'DRAW');

  function refreshOutcomeButtons(currentOutcome){
    // t1 button
    const t1Active=currentOutcome==='t1';
    t1Btn.style.border=t1Active?'2px solid #f59e0b':'2px solid transparent';
    t1Btn.style.background=t1Active?'#1e3a5f':'#0f2340';
    t1Btn.style.color=t1Active?'#f59e0b':'#94a3b8';
    t1Btn.style.fontWeight=t1Active?'700':'400';
    t1Btn.style.opacity=locked&&!t1Active&&res?'0.4':'1';
    // draw button
    const drawActive=currentOutcome==='draw';
    drawBtn.style.border=drawActive?'2px solid #a78bfa':'2px solid #1e3a5f';
    drawBtn.style.background=drawActive?'#2d1f5e':'#0f2340';
    drawBtn.style.color=drawActive?'#a78bfa':'#475569';
    // t2 button
    const t2Active=currentOutcome==='t2';
    t2Btn.style.border=t2Active?'2px solid #f59e0b':'2px solid transparent';
    t2Btn.style.background=t2Active?'#1e3a5f':'#0f2340';
    t2Btn.style.color=t2Active?'#f59e0b':'#94a3b8';
    t2Btn.style.fontWeight=t2Active?'700':'400';
    t2Btn.style.opacity=locked&&!t2Active&&res?'0.4':'1';
  }

  // Set initial styles based on current pick
  const initOutcome=pick?pick.outcome:null;
  if(isAdmin){
    // Show actual result highlight
    refreshOutcomeButtons(ao);
  } else {
    refreshOutcomeButtons(initOutcome);
  }

  obRow.appendChild(t1Btn);
  obRow.appendChild(drawBtn);
  obRow.appendChild(t2Btn);
  card.appendChild(obRow);

  // feedback element — updated in place
  const fbEl=div({marginTop:'7px',fontSize:'12px'});

  function refreshFeedback(currentOutcome,s1,s2){
    if(res){
      const ao2=outcome(res.s1,res.s2);
      const correct=currentOutcome===ao2;
      const exact=s1!==''&&s2!==''&&+s1===res.s1&&+s2===res.s2;
      const pts=(correct?3:0)+(exact?2:0);
      fbEl.style.color=pts>0?'#22c55e':'#f87171';
      fbEl.textContent=(correct?'✓ outcome +3':'✗ outcome')+(exact?'  ·  ✓ score +2':'')+'  +'+pts+' pts';
    } else if(dayLocked&&!currentOutcome){
      fbEl.style.color='#f87171';fbEl.textContent='No pick submitted';
    } else if(currentOutcome){
      fbEl.style.color='#64748b';fbEl.textContent='Hit Save pick ✓ to confirm';
    } else {
      fbEl.style.color='#334155';fbEl.textContent='Tap '+m.t1+', Draw, or '+m.t2+' then hit Save';
    }
  }

  // score row
  const sRow=div({display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'});
  sRow.appendChild(txt({color:'#475569',fontSize:'12px',fontWeight:'600'},isAdmin?'Score:':'Predict score:'));
  if(isAdmin){
    const s1=makeNumInput(res?res.s1:'',v=>{
      if(!state.actual[m.id])state.actual[m.id]={s1:0,s2:0};
      state.actual[m.id].s1=parseInt(v)||0;
    });
    const s2=makeNumInput(res?res.s2:'',v=>{
      if(!state.actual[m.id])state.actual[m.id]={s1:0,s2:0};
      state.actual[m.id].s2=parseInt(v)||0;
    });
    sRow.appendChild(s1);
    sRow.appendChild(txt({color:'#334155',fontWeight:'700'},'–'));
    sRow.appendChild(s2);
    const savBtn=btn({marginLeft:'8px',padding:'5px 12px',borderRadius:'8px',border:'none',background:'#22c55e',color:'#0a1929',fontWeight:'700',fontSize:'12px',cursor:'pointer'},()=>{
      const cur=state.actual[m.id]||{s1:0,s2:0};
      store(K.actual,state.actual);
      setState({actual:{...state.actual}});
      showToast('Result saved!');
    },'Save ✓');
    sRow.appendChild(savBtn);
  } else {
    // Use a local draft that doesn't save until Save is hit
    const initPick=state.allPicks[user]&&state.allPicks[user][m.id]||{outcome:null,s1:'',s2:''};
    let draftOutcome=initPick.outcome;
    let draftS1=initPick.s1||'';
    let draftS2=initPick.s2||'';
    let saved=!!initPick.outcome; // already has a pick

    // Wire outcome buttons to update draft instead of saving immediately
    [t1Btn,drawBtn,t2Btn].forEach(b=>b._isDraft=true);

    // Override outcome button behavior to use draft
    t1Btn.onclick=()=>{
      if(locked)return;
      draftOutcome=draftOutcome==='t1'?null:'t1';
      saved=false;
      refreshOutcomeButtons(draftOutcome);
      refreshFeedback(draftOutcome,draftS1,draftS2);
    };
    drawBtn.onclick=()=>{
      if(locked)return;
      draftOutcome=draftOutcome==='draw'?null:'draw';
      saved=false;
      refreshOutcomeButtons(draftOutcome);
      refreshFeedback(draftOutcome,draftS1,draftS2);
    };
    t2Btn.onclick=()=>{
      if(locked)return;
      draftOutcome=draftOutcome==='t2'?null:'t2';
      saved=false;
      refreshOutcomeButtons(draftOutcome);
      refreshFeedback(draftOutcome,draftS1,draftS2);
    };

    const s1inp=makeNumInput(draftS1,v=>{draftS1=v;saved=false;refreshFeedback(draftOutcome,draftS1,draftS2);},locked);
    const s2inp=makeNumInput(draftS2,v=>{draftS2=v;saved=false;refreshFeedback(draftOutcome,draftS1,draftS2);},locked);
    sRow.appendChild(s1inp);
    sRow.appendChild(txt({color:'#334155',fontWeight:'700'},'–'));
    sRow.appendChild(s2inp);

    if(!locked){
      const saveBtn=btn({marginLeft:'10px',padding:'6px 14px',borderRadius:'8px',border:'none',background:'#f59e0b',color:'#0a1929',fontWeight:'800',fontSize:'13px',cursor:'pointer'},()=>{
        if(!draftOutcome){
          saveBtn.textContent='Pick a team first!';
          saveBtn.style.background='#f87171';
          setTimeout(()=>{saveBtn.textContent='Save pick ✓';saveBtn.style.background='#f59e0b';},1500);
          return;
        }
        updatePick(m.id,{outcome:draftOutcome,s1:draftS1,s2:draftS2},user);
        saved=true;
        saveBtn.textContent='Saved! ✓';
        saveBtn.style.background='#22c55e';
        saveBtn.style.color='#fff';
        setTimeout(()=>{saveBtn.textContent='Save pick ✓';saveBtn.style.background='#f59e0b';saveBtn.style.color='#0a1929';},2000);
        refreshFeedback(draftOutcome,draftS1,draftS2);
      },'Save pick ✓');
      sRow.appendChild(saveBtn);
    }
  }
  card.appendChild(sRow);

  if(!isAdmin){
    // Set initial feedback
    refreshFeedback(initOutcome,pick?pick.s1:'',pick?pick.s2:'');
    card.appendChild(fbEl);
  }
  return card;
}

function makeNumInput(val,onChange,disabled){
  const inp=f('input',{type:'number',min:'0',max:'20',value:val,disabled:!!disabled,style:{width:'44px',padding:'5px 4px',borderRadius:'7px',border:'1px solid #1e3a5f',background:'#060f1e',color:'#e2e8f0',fontSize:'14px',textAlign:'center',outline:'none'}});
  inp.addEventListener('change',e=>onChange(e.target.value));
  inp.addEventListener('input',e=>onChange(e.target.value));
  return inp;
}

function updatePick(matchId,data,user){
  lastPickTime = Date.now();
  if(!state.allPicks[user])state.allPicks[user]={};
  state.allPicks[user]={...state.allPicks[user],[matchId]:data};
  const key = K.upicks(user);
  lsSet('wc-'+key, state.allPicks[user]);
  dbSet(key, JSON.stringify(state.allPicks[user]));
}

  // Match picks summary
  const picked=SCHEDULE.filter(m=>myPicks[m.id]);
  wrap.appendChild(txt({color:'#f59e0b',fontSize:'12px',fontWeight:'700',letterSpacing:'1px',textTransform:'uppercase',display:'block',marginBottom:'8px'},'MATCH PICKS ('+picked.length+'/'+SCHEDULE.length+')'));
  const dates=[...new Set(SCHEDULE.map(m=>m.date))];
  dates.forEach(date=>{
    const ms=SCHEDULE.filter(m=>m.date===date&&myPicks[m.id]);
    if(ms.length===0)return;
    wrap.appendChild(txt({fontSize:'12px',fontWeight:'700',color:'#64748b',display:'block',marginBottom:'6px',marginTop:'10px'},date));
    ms.forEach(m=>{
      const pk=myPicks[m.id];const res=actual[m.id]||m.result||null;
      const ao=res?outcome(res.s1,res.s2):null;
      const correct=res&&pk.outcome===ao;const exact=res&&pk.s1!==''&&pk.s2!==''&&+pk.s1===res.s1&&+pk.s2===res.s2;
      const pts=(correct?3:0)+(exact?2:0);
      const outcomeTeam=pk.outcome==='t1'?m.t1:pk.outcome==='t2'?m.t2:'Draw';
      const row=div({background:'#0a1929',borderRadius:'10px',padding:'9px 13px',marginBottom:'5px',border:'1px solid '+(res?'#1e4a2f':'#1e3a5f'),display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'});
      row.appendChild(div({background:'#f59e0b',color:'#0a1929',fontWeight:'800',borderRadius:'5px',padding:'2px 6px',fontSize:'10px',flexShrink:'0'},m.grp));
      row.appendChild(txt({color:'#475569',fontSize:'12px',flexShrink:'0',minWidth:'90px'},cvtTime(m.time)));
      row.appendChild(txt({flex:'1',fontSize:'13px',color:'#94a3b8'},FLAGS[m.t1]+' '+m.t1+' vs '+m.t2+' '+FLAGS[m.t2]));
      row.appendChild(txt({fontWeight:'700',fontSize:'13px',color:res?(correct?'#22c55e':'#f87171'):'#e2e8f0'},(pk.outcome==='draw'?'🤝 ':FLAGS[outcomeTeam]||'')+' '+outcomeTeam+(pk.s1!==''?'  '+pk.s1+'–'+pk.s2:'')));
      if(res)row.appendChild(txt({fontWeight:'700',fontSize:'12px',color:pts>0?'#22c55e':'#f87171'},pts>0?'+'+pts+'pts':'0pts'));
      wrap.appendChild(row);
    });
  });
  return wrap;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
// Track last time user made a pick - don't reload picks for 30s after any pick
let lastPickTime = 0;

// Auto-reload every 5 minutes - only updates shared data, never overwrites current user picks
setInterval(async ()=>{
  if(!state.user||state.loading)return;
  await loadAll(false);
}, 300000);

// Try to restore session
const savedUser=(() => {try{return localStorage.getItem('wc26:username');}catch{return null;}})();
if(savedUser){
  state.user=savedUser;
  if(savedUser!=='Commissioner')state.showGroups=true;
}

// Initial load
loadAll(true).then(()=>{
  // After load, check if returning user has group picks
  if(state.user&&state.user!=='Commissioner'){
    const gp=state.allGpicks[state.user];
    if(gp&&Object.keys(gp).length===12)state.showGroups=false;
  }
  render();
});
</script>
